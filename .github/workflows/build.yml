name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: sniproxy-ng-linux-amd64-musl
            package_stem: sniproxy-ng-linux-amd64-musl
            binary_name: sniproxy-ng
            use_cross: true
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: sniproxy-ng-linux-arm64-musl
            package_stem: sniproxy-ng-linux-arm64-musl
            binary_name: sniproxy-ng
            use_cross: true
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: sniproxy-ng-darwin-arm64
            package_stem: sniproxy-ng-darwin-arm64
            binary_name: sniproxy-ng
            use_cross: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sniproxy-ng-windows-amd64
            package_stem: sniproxy-ng-windows-amd64
            binary_name: sniproxy-ng.exe
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve package version
        id: package_meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            version="${{ github.event.inputs.release_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="sha-${GITHUB_SHA::7}"
          fi
          package_dir="${{ matrix.package_stem }}-${version}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            archive_name="${package_dir}.zip"
          else
            archive_name="${package_dir}.tar.gz"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          mkdir "${{ steps.package_meta.outputs.package_dir }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} "${{ steps.package_meta.outputs.package_dir }}/sniproxy-ng"
          cp config.toml.example "${{ steps.package_meta.outputs.package_dir }}/config.toml.example"
          tar -czf "dist/${{ steps.package_meta.outputs.archive_name }}" "${{ steps.package_meta.outputs.package_dir }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ steps.package_meta.outputs.package_dir }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ steps.package_meta.outputs.package_dir }}/sniproxy-ng.exe"
          Copy-Item "config.toml.example" "${{ steps.package_meta.outputs.package_dir }}/config.toml.example"
          Compress-Archive -Path "${{ steps.package_meta.outputs.package_dir }}" -DestinationPath "dist/${{ steps.package_meta.outputs.archive_name }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_meta.outputs.archive_name }}
          path: dist/${{ steps.package_meta.outputs.archive_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: ls -lah artifacts

      - name: Upload archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
