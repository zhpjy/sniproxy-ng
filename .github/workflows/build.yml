name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: sniproxy-ng-linux-amd64-musl
            package_stem: sniproxy-ng-linux-amd64-musl
            binary_name: sniproxy-ng
            archive_ext: tar.gz
            build_command: cargo zigbuild --release --target x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: sniproxy-ng-linux-arm64-musl
            package_stem: sniproxy-ng-linux-arm64-musl
            binary_name: sniproxy-ng
            archive_ext: tar.gz
            build_command: cargo zigbuild --release --target aarch64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: sniproxy-ng-darwin-arm64
            package_stem: sniproxy-ng-darwin-arm64
            binary_name: sniproxy-ng
            archive_ext: tar.gz
            build_command: cargo build --release --target aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sniproxy-ng-windows-amd64
            package_stem: sniproxy-ng-windows-amd64
            binary_name: sniproxy-ng.exe
            archive_ext: zip
            build_command: cargo build --release --target x86_64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v1
        with:
          version: latest

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-zigbuild --locked

      - name: Build binary
        run: ${{ matrix.build_command }}

      - name: Resolve package version
        id: package_meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            version="${{ github.event.inputs.release_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="sha-${GITHUB_SHA::7}"
          fi
          archive_name="${{ matrix.package_stem }}-${version}.${{ matrix.archive_ext }}"
          package_dir="${{ matrix.package_stem }}-${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          mkdir "${{ steps.package_meta.outputs.package_dir }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ steps.package_meta.outputs.package_dir }}/sniproxy-ng"
          cp config.toml.example "${{ steps.package_meta.outputs.package_dir }}/config.toml.example"
          tar -czf "dist/${{ steps.package_meta.outputs.archive_name }}" "${{ steps.package_meta.outputs.package_dir }}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ steps.package_meta.outputs.package_dir }}" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ steps.package_meta.outputs.package_dir }}/sniproxy-ng.exe"
          Copy-Item "config.toml.example" "${{ steps.package_meta.outputs.package_dir }}/config.toml.example"
          Compress-Archive -Path "${{ steps.package_meta.outputs.package_dir }}" -DestinationPath "dist/${{ steps.package_meta.outputs.archive_name }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package_meta.outputs.archive_name }}
          path: dist/${{ steps.package_meta.outputs.archive_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: ls -lah artifacts

      - name: Upload archives to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-manifest:
    name: Update release-assets.json
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update release manifest
        run: |
          python3 scripts/update-release-assets.py \
            --release-tag "${{ steps.resolve_tag.outputs.tag }}" \
            --artifacts-dir artifacts \
            --manifest release-assets.json

      - name: Commit updated manifest
        shell: bash
        run: |
          if git diff --quiet -- release-assets.json; then
            echo "release-assets.json is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-assets.json
          git commit -m "chore: update release-assets.json for ${{ steps.resolve_tag.outputs.tag }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
